name: Deploy

on:
  push:
    branches:
      - master

jobs:
  build-gh-pages:
    name: Build (GitHub Pages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
      - uses: bahmutov/npm-install@v1
      - name: Build
        run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist-gh-pages
          path: ./dist

  build-vps:
    name: Build (VPS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
      - uses: bahmutov/npm-install@v1
      - name: Build
        run: npx tsc -b && npx vite build --base /p24/wa/
      - uses: actions/upload-artifact@v4
        with:
          name: dist-vps
          path: ./dist

  deploy-gh-pages:
    name: Deploy to GitHub Pages
    needs: build-gh-pages
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-gh-pages
          path: ./dist
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

  deploy-vps:
    name: Deploy to VPS
    needs: build-vps
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-vps
          path: ./dist
      - name: Install rsync
        run: sudo apt-get install -y rsync

      - name: Deploy via rsync
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" > /tmp/vps_key
          chmod 600 /tmp/vps_key
          rsync -avz --delete \
            -e "ssh -i /tmp/vps_key -o StrictHostKeyChecking=no" \
            dist/ root@${{ secrets.VPS_HOST }}:/var/www/p24-wa/
